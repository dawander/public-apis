name: Sync fork with upstream

on:
  schedule:
    - cron: '17 6 * * *'   # daily at 06:17 UTC
  workflow_dispatch:        # allow manual run from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Merge upstream into default branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch=$(gh api "repos/${{ github.repository }}" --jq .default_branch)
          echo "Syncing '$branch' from upstream parent..."
          gh api -X POST "repos/${{ github.repository }}/merge-upstream" -f branch="$branch"
